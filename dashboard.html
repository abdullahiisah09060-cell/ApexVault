<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | ApexVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>body { background: #080b12; color: #f1f5f9; font-family: 'Inter', sans-serif; }</style>
</head>
<body>
    <div class="max-w-lg mx-auto min-h-screen bg-[#0d1120] pb-24">
        <!-- Header -->
        <header class="p-6 flex justify-between items-center bg-[#080b12]/50 backdrop-blur">
            <div>
                <p class="text-slate-400 text-xs">Welcome back,</p>
                <h2 id="userName" class="text-xl font-bold">Loading...</h2>
            </div>
            <img id="userAvatar" src="https://ui-avatars.com/api/?background=d4af37&color=000" class="w-10 h-10 rounded-full border-2 border-amber-500">
        </header>

        <!-- Balance Card -->
        <div class="px-6 py-8">
            <div class="bg-gradient-to-br from-amber-500 to-amber-700 p-6 rounded-3xl shadow-xl shadow-amber-500/20 text-black">
                <p class="text-black/70 text-sm font-medium">Available Balance</p>
                <h1 id="userBalance" class="text-4xl font-black my-2">₦0.00</h1>
                <div class="flex gap-4 mt-4">
                    <a href="deposit.html" class="bg-black text-white px-6 py-2 rounded-xl text-sm font-bold">Deposit</a>
                    <a href="withdraw.html" class="bg-white/20 px-6 py-2 rounded-xl text-sm font-bold">Withdraw</a>
                </div>
            </div>
        </div>

        <!-- Recent Transactions -->
        <div class="px-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold">Recent Transactions</h3>
                <a href="transactions.html" class="text-amber-500 text-xs font-bold">See All</a>
            </div>
            <div id="txContainer" class="space-y-4">
                <!-- Transactions will be injected here via app.js -->
            </div>
        </div>

        <!-- Floating Bottom Nav -->
        <nav class="fixed bottom-0 w-full max-w-lg bg-[#080b12] border-t border-white/10 p-4 grid grid-cols-4 gap-4 text-center">
            <a href="dashboard.html" class="text-amber-500 text-xs"><i class="fa-solid fa-house block mb-1"></i>Home</a>
            <a href="invest.html" class="text-slate-500 text-xs"><i class="fa-solid fa-chart-line block mb-1"></i>Invest</a>
            <a href="referrals.html" class="text-slate-500 text-xs"><i class="fa-solid fa-users block mb-1"></i>Refer</a>
            <a href="profile.html" class="text-slate-500 text-xs"><i class="fa-solid fa-user block mb-1"></i>Profile</a>
        </nav>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
