<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Create Account | BluePay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg: #06080f; --bg2: #0b0f1a; --blue: #1d4ed8; --blue2: #3b82f6; --gold: #d4af37; --text: #f8fafc; --muted: #64748b; --border: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        .auth-container { padding: 40px 6%; flex: 1; display: flex; flex-direction: column; justify-content: center; max-width: 450px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .logo-box { text-align: center; margin-bottom: 30px; }
        .logo-box i { font-size: 32px; color: var(--blue); margin-bottom: 10px; }
        h2 { font-size: 28px; font-weight: 800; margin: 0 0 10px; }
        p.subtitle { color: var(--muted); font-size: 14px; margin-bottom: 30px; }

        .form-group { margin-bottom: 20px; position: relative; }
        label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; }
        input { width: 100%; background: var(--bg2); border: 1px solid var(--border); padding: 14px 16px 14px 45px; border-radius: 12px; color: #fff; font-size: 15px; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--blue); background: var(--bg3); }
        
        .eye-btn { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); cursor: pointer; }

        /* Password Strength */
        .strength-meter { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .strength-bar { height: 100%; width: 0%; transition: 0.4s; }

        .btn-submit { background: linear-gradient(135deg, var(--blue), var(--blue2)); color: #fff; width: 100%; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700; margin-top: 20px; box-shadow: 0 10px 20px rgba(29, 78, 216, 0.3); }
        .btn-submit:disabled { opacity: 0.6; }

        .google-btn { background: #fff; color: #000; width: 100%; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 600; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .footer-text { text-align: center; margin-top: 30px; font-size: 14px; color: var(--muted); }
        .footer-text a { color: var(--blue2); font-weight: 700; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="logo-box">
        <i class="fa-solid fa-shield-halved"></i>
        <h2>Create Account</h2>
        <p class="subtitle">Join thousands of smart investors today.</p>
    </div>

    <form id="regForm">
        <div class="form-group">
            <label>Full Name</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="fullName" placeholder="Enter your full name" required>
            </div>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-phone"></i>
                <input type="tel" id="phone" placeholder="08012345678" required>
            </div>
        </div>

        <div class="form-group">
            <label>Create Password</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="••••••••" required>
                <i class="fa-solid fa-eye eye-btn" id="togglePass"></i>
            </div>
            <div class="strength-meter"><div class="strength-bar" id="strengthBar"></div></div>
        </div>

        <div class="form-group">
            <label>Referral Code (Optional)</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-users"></i>
                <input type="text" id="refCode" placeholder="Invite code">
            </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Create Free Account</button>
    </form>

    <button class="google-btn" id="googleBtn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_放歌_Icon.svg" width="18">
        Continue with Google
    </button>

    <p class="footer-text">Already have an account? <a href="login.html">Login</a></p>
</div>

<script type="module">
    import { registerUser, continueWithGoogle } from './auth.js';
    import { toast } from './firebase-config.js';

    const form = document.getElementById('regForm');
    const passInput = document.getElementById('password');
    const strengthBar = document.getElementById('strengthBar');
    const togglePass = document.getElementById('togglePass');

    // Password Strength
    passInput.oninput = () => {
        let val = passInput.value;
        let score = 0;
        if(val.length > 6) score += 33;
        if(/[A-Z]/.test(val)) score += 33;
        if(/[0-9]/.test(val)) score += 34;
        
        strengthBar.style.width = score + '%';
        strengthBar.style.background = score < 60 ? '#ef4444' : score < 90 ? '#f0d878' : '#22c55e';
    };

    togglePass.onclick = () => {
        const type = passInput.type === 'password' ? 'text' : 'password';
        passInput.type = type;
        togglePass.classList.toggle('fa-eye-slash');
    };

    form.onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Initializing...';

        const success = await registerUser(
            document.getElementById('fullName').value,
            document.getElementById('email').value,
            document.getElementById('phone').value,
            document.getElementById('password').value,
            document.getElementById('refCode').value
        );

        if(success) window.location.href = 'verify.html';
        else {
            btn.disabled = false;
            btn.innerHTML = 'Create Free Account';
        }
    };

    document.getElementById('googleBtn').onclick = continueWithGoogle;
</script>
</body>
</html>
