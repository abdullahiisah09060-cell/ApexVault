<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join ApexVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md bg-slate-900 p-8 rounded-3xl border border-slate-800">
        <h2 class="text-3xl font-black text-white mb-2">Create Account</h2>
        <p class="text-slate-400 mb-8">Get ₦200,000 welcome bonus.</p>
        <form id="regForm" class="space-y-4">
            <input type="text" id="name" placeholder="Full Name" class="w-full p-4 bg-slate-950 rounded-xl border border-slate-700 text-white" required>
            <input type="email" id="email" placeholder="Email Address" class="w-full p-4 bg-slate-950 rounded-xl border border-slate-700 text-white" required>
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 bg-slate-950 rounded-xl border border-slate-700 text-white" required>
            <button type="submit" class="w-full py-4 bg-amber-500 text-black font-bold rounded-xl">Register Now</button>
        </form>
        <p class="mt-6 text-center text-slate-500">Already have an account? <a href="login.html" class="text-amber-500">Login</a></p>
    </div>

    <script type="module">
        import { registerUser } from './auth.js';
        document.getElementById('regForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            registerUser(email, pass, name);
        });
    </script>
</body>
</html>
