<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | ApexVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #080b12; color: #f1f5f9; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md bg-[#0d1120] p-8 rounded-3xl border border-white/10">
        <h2 class="text-3xl font-black mb-2 italic">Join <span class="text-amber-500">ApexVault</span></h2>
        <p class="text-slate-400 mb-8">Start your journey to financial freedom.</p>
        
        <form id="registerForm" class="space-y-4">
            <input type="text" id="fullName" placeholder="Full Name" class="w-full bg-[#111827] p-4 rounded-xl border border-white/5 outline-none focus:border-amber-500" required>
            <input type="email" id="email" placeholder="Email Address" class="w-full bg-[#111827] p-4 rounded-xl border border-white/5 outline-none focus:border-amber-500" required>
            <input type="password" id="password" placeholder="Password" class="w-full bg-[#111827] p-4 rounded-xl border border-white/5 outline-none focus:border-amber-500" required>
            <input type="text" id="refCode" placeholder="Referral Code (Optional)" class="w-full bg-[#111827] p-4 rounded-xl border border-white/5 outline-none focus:border-amber-500">
            
            <button type="submit" class="w-full bg-amber-500 text-black font-bold py-4 rounded-xl hover:bg-amber-400 transition">Create Account</button>
        </form>

        <div class="my-6 flex items-center gap-4 text-slate-500 text-sm">
            <div class="flex-1 h-px bg-white/10"></div> OR <div class="flex-1 h-px bg-white/10"></div>
        </div>

        <button id="googleBtn" class="w-full border border-white/10 py-4 rounded-xl hover:bg-white/5 transition flex items-center justify-center gap-2">
            Sign up with Google
        </button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
