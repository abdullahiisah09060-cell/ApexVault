
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw Funds | ApexVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] text-white p-6">
    <div class="max-w-md mx-auto bg-slate-900 p-8 rounded-3xl border border-slate-800">
        <h2 class="text-2xl font-bold mb-6">Withdraw Funds</h2>
        <div class="space-y-4">
            <input type="number" placeholder="Amount (₦)" class="w-full p-4 bg-slate-950 rounded-xl border border-slate-700">
            <input type="text" placeholder="Enter ₦10k Withdrawal Code" class="w-full p-4 bg-slate-950 rounded-xl border border-slate-700">
            <button class="w-full py-4 bg-amber-500 text-black font-bold rounded-xl">Request Withdrawal</button>
        </div>
        <p class="mt-6 text-sm text-center text-slate-500">Don't have a code? <a href="buy-code.html" class="text-amber-500 underline">Buy one here</a></p>
    </div>
</body>
</html>
