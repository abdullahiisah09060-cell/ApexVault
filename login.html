
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to ApexVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md bg-slate-900 p-8 rounded-3xl border border-slate-800">
        <h2 class="text-3xl font-black text-white mb-8">Welcome Back</h2>
        <form id="loginForm" class="space-y-4">
            <input type="email" id="email" placeholder="Email Address" class="w-full p-4 bg-slate-950 rounded-xl border border-slate-700 text-white" required>
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 bg-slate-950 rounded-xl border border-slate-700 text-white" required>
            <button type="submit" class="w-full py-4 bg-amber-500 text-black font-bold rounded-xl">Sign In</button>
        </form>
    </div>

    <script type="module">
        import { loginUser } from './auth.js';
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            loginUser(email, pass);
        });
    </script>
</body>
</html>
