<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email | BluePay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg: #06080f; --bg2: #0b0f1a; --blue: #1d4ed8; --text: #f8fafc; --muted: #64748b; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 20px; text-align: center; }
        .card { background: var(--bg2); padding: 40px 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.08); max-width: 400px; width: 100%; }
        .icon-circle { width: 80px; height: 80px; background: rgba(29,78,216,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; }
        .icon-circle i { font-size: 32px; color: var(--blue); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
        h2 { font-size: 24px; font-weight: 800; margin-bottom: 15px; }
        p { color: var(--muted); font-size: 15px; line-height: 1.6; margin-bottom: 30px; }
        #emailDisplay { color: var(--blue); font-weight: 700; display: block; margin-top: 5px; }
        .resend-btn { background: none; border: 1px solid var(--blue); color: var(--blue); padding: 12px 25px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .resend-btn:disabled { opacity: 0.4; border-color: var(--muted); color: var(--muted); cursor: not-allowed; }
    </style>
</head>
<body>

<div class="card">
    <div class="icon-circle"><i class="fa-solid fa-envelope-open-text"></i></div>
    <h2>Verify Your Email</h2>
    <p>We've sent a verification link to your inbox: <span id="emailDisplay">...</span>. Click the link to activate your account.</p>
    
    <button class="resend-btn" id="resendBtn">Resend Email (<span id="timer">60</span>s)</button>
    <p style="margin-top: 25px; font-size: 12px; opacity: 0.6;"><i class="fas fa-spinner fa-spin"></i> Waiting for verification...</p>
</div>

<script type="module">
    import { auth, toast } from './firebase-config.js';
    import { sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    let cooldown = 60;
    const btn = document.getElementById('resendBtn');
    const timerText = document.getElementById('timer');

    auth.onAuthStateChanged(user => {
        if(!user) { window.location.href = 'login.html'; return; }
        if(user.emailVerified) { window.location.href = 'welcome.html'; return; }
        document.getElementById('emailDisplay').innerText = user.email;

        // Auto-poll verification status every 4 seconds
        const poll = setInterval(async () => {
            await user.reload();
            if(user.emailVerified) {
                clearInterval(poll);
                window.location.href = 'welcome.html';
            }
        }, 4000);
    });

    const startTimer = () => {
        btn.disabled = true;
        const interval = setInterval(() => {
            cooldown--;
            timerText.innerText = cooldown;
            if(cooldown <= 0) {
                clearInterval(interval);
                btn.disabled = false;
                btn.innerHTML = 'Resend Email';
                cooldown = 60;
            }
        }, 1000);
    };

    btn.onclick = async () => {
        try {
            await sendEmailVerification(auth.currentUser);
            toast('Verification link resent!');
            startTimer();
        } catch (e) {
            toast(e.message, 'error');
        }
    };

    startTimer();
</script>
</body>
</html>
