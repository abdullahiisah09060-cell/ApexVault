<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | BluePay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg: #06080f; --bg2: #0b0f1a; --blue: #1d4ed8; --text: #f8fafc; --muted: #64748b; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; padding: 20px; }
        .card { background: var(--bg2); padding: 40px 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.08); max-width: 400px; width: 100%; text-align: center; }
        .icon { width: 70px; height: 70px; background: rgba(29,78,216,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 28px; color: var(--blue); }
        h2 { font-size: 24px; font-weight: 800; margin-bottom: 10px; }
        p { color: var(--muted); font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
        input { width: 100%; background: #000; border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; color: #fff; font-size: 15px; margin-bottom: 20px; box-sizing: border-box; }
        .btn { background: var(--blue); color: #fff; width: 100%; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <div class="icon"><i class="fa-solid fa-key"></i></div>
    <h2>Reset Password</h2>
    <p>Enter your email address and we'll send you a link to reset your password.</p>
    
    <form id="resetForm">
        <input type="email" id="email" placeholder="Enter your email" required>
        <button type="submit" class="btn" id="btn">Send Reset Link</button>
    </form>
    
    <a href="login.html" style="color: var(--muted); display: block; margin-top: 20px; font-size: 14px; text-decoration: none;"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
</div>

<script type="module">
    import { auth, toast } from './firebase-config.js';
    import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    document.getElementById('resetForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

        try {
            await sendPasswordResetEmail(auth, document.getElementById('email').value);
            toast('Password reset email sent!');
            btn.innerHTML = 'Email Sent!';
        } catch (e) {
            toast(e.message, 'error');
            btn.disabled = false;
            btn.innerHTML = 'Send Reset Link';
        }
    };
</script>
</body>
</html>
