<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join BluePay | Start Investing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg: #06080f; --bg2: #0b0f1a; --blue: #1d4ed8; --blue2: #3b82f6; --text: #eef0f4; --muted: #8896aa; --red: #ef4444; --green: #22c55e; --border: rgba(255,255,255,0.07); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .auth-card { background: var(--bg2); padding: 40px; border-radius: 24px; width: 100%; max-width: 450px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .logo { text-align: center; font-size: 24px; font-weight: 800; margin-bottom: 30px; }
        .logo span { color: var(--blue); }
        h2 { margin-bottom: 10px; text-align: center; }
        p.subtitle { text-align: center; color: var(--muted); margin-bottom: 30px; font-size: 14px; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--muted); }
        .input-group i { position: absolute; left: 15px; top: 38px; color: var(--muted); }
        .input-group input { width: 100%; padding: 12px 15px 12px 45px; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; color: white; outline: none; transition: 0.3s; background: #0f1422; }
        .input-group input:focus { border-color: var(--blue); }
        .eye-toggle { position: absolute; right: 15px; top: 38px; cursor: pointer; color: var(--muted); }
        
        .strength-meter { height: 4px; background: var(--border); margin-top: 8px; border-radius: 2px; overflow: hidden; }
        .strength-bar { height: 100%; width: 0; transition: 0.3s; }

        .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--blue), var(--blue2)); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn-google { width: 100%; padding: 12px; background: white; color: #000; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .footer-links { text-align: center; margin-top: 25px; font-size: 14px; color: var(--muted); }
        .footer-links a { color: var(--blue); text-decoration: none; font-weight: 600; }
        
        .checkbox-group { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--muted); margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo">BLUE<span>PAY</span></div>
        <h2>Create Account</h2>
        <p class="subtitle">Start your journey to financial freedom today.</p>

        <form id="register-form">
            <div class="input-group">
                <label>Full Name</label>
                <i class="fas fa-user"></i>
                <input type="text" id="reg-name" placeholder="John Doe" required>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <i class="fas fa-envelope"></i>
                <input type="email" id="reg-email" placeholder="name@example.com" required>
            </div>
            <div class="input-group">
                <label>Phone Number</label>
                <i class="fas fa-phone"></i>
                <input type="tel" id="reg-phone" placeholder="08012345678" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <i class="fas fa-lock"></i>
                <input type="password" id="reg-password" placeholder="••••••••" required>
                <i class="fas fa-eye eye-toggle" onclick="togglePass('reg-password')"></i>
                <div class="strength-meter"><div id="strength-bar" class="strength-bar"></div></div>
            </div>
            <div class="input-group">
                <label>Referral Code (Optional)</label>
                <i class="fas fa-users"></i>
                <input type="text" id="reg-ref" placeholder="BLUE1234">
            </div>

            <div class="checkbox-group">
                <input type="checkbox" required>
                <span>I agree to the <a href="terms.html">Terms</a> and <a href="privacy.html">Privacy Policy</a></span>
            </div>

            <button type="submit" class="btn-primary" id="reg-btn">Create Account</button>
        </form>

        <button class="btn-google" id="google-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_放歌_Icon.svg" width="18">
            Continue with Google
        </button>

        <div class="footer-links">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script type="module">
        import { registerUser, signInWithGoogle } from './auth.js';
        import { toast } from './firebase-config.js';

        const form = document.getElementById('register-form');
        const passInput = document.getElementById('reg-password');
        const strengthBar = document.getElementById('strength-bar');

        // Password Strength Logic
        passInput.addEventListener('input', () => {
            const val = passInput.value;
            let strength = 0;
            if (val.length > 6) strength += 25;
            if (val.match(/[A-Z]/)) strength += 25;
            if (val.match(/[0-9]/)) strength += 25;
            if (val.match(/[^A-Za-z0-9]/)) strength += 25;
            
            strengthBar.style.width = strength + '%';
            strengthBar.style.background = strength < 50 ? '#ef4444' : strength < 100 ? '#f0d878' : '#22c55e';
        });

        window.togglePass = (id) => {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reg-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
            btn.disabled = true;

            const res = await registerUser(
                document.getElementById('reg-email').value,
                document.getElementById('reg-password').value,
                document.getElementById('reg-name').value,
                document.getElementById('reg-phone').value,
                document.getElementById('reg-ref').value
            );

            if (res.success) {
                window.location.href = 'verify.html';
            } else {
                btn.innerHTML = 'Create Account';
                btn.disabled = false;
            }
        };

        document.getElementById('google-btn').onclick = signInWithGoogle;
    </script>
</body>
</html>
